# ============================================================
# Render Infrastructure as Code (IaC)
# ============================================================
# Este archivo define la configuración del servicio en Render.
# Es SEGURO commitearlo a Git (incluso en repo público) porque:
#
#   1. NO contiene credenciales reales
#   2. Las variables sensibles usan `sync: false` lo que significa
#      que sus valores SOLO viven en el dashboard de Render
#      (cifrados en reposo) y NUNCA se leen de este archivo
#
# Regla de oro: Si añades una variable sensible (password, API key,
# token), SIEMPRE usa `sync: false`. NUNCA pongas el valor literal.
# ============================================================

services:
  - type: web
    name: portfolio-contact-api
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pnpm install --frozen-lockfile --prod
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Públicas (no sensibles)
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PORT
        value: 3306
      - key: CORS_ORIGIN
        value: https://roldandev.com
      - key: RATE_LIMIT_MAX
        value: 10
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: DB_AUTO_MIGRATE
        value: false
      - key: DB_SSL
        value: true

      # Secretas (gestionadas solo desde el dashboard de Render)
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
